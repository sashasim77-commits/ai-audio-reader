<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AudioReader" />
  <title>AI Audio Reader</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <button class="icon-btn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="header-title">AI Audio Reader</span>
      <button class="icon-btn" id="uploadBtn" aria-label="Upload file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
      <input type="file" id="fileInput" accept="audio/*" multiple hidden />
    </header>

    <!-- Main Player View -->
    <main class="player-view" id="playerView">

      <!-- Cover Art -->
      <div class="cover-container">
        <div class="cover-art" id="coverArt">
          <svg class="cover-placeholder" viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="30" stroke="#6c63ff" stroke-width="3" opacity="0.5"/>
            <circle cx="50" cy="50" r="10" fill="#6c63ff" opacity="0.7"/>
            <circle cx="50" cy="50" r="3" fill="#fff"/>
          </svg>
        </div>
        <div class="now-playing-badge">NOW PLAYING</div>
      </div>

      <!-- Track Info -->
      <div class="track-info">
        <h2 class="track-title" id="trackTitle">Select an audiobook</h2>
        <p class="track-author" id="trackAuthor">Upload audio files to begin</p>
      </div>

      <!-- Progress Bar -->
      <div class="progress-container">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <div class="time-labels">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="icon-btn skip-btn" id="rewindBtn" aria-label="Rewind 15 seconds">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          </svg>
          <span class="skip-label">15</span>
        </button>

        <button class="play-btn" id="playBtn" aria-label="Play/Pause">
          <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
          <svg class="pause-icon hidden" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>

        <button class="icon-btn skip-btn" id="forwardBtn" aria-label="Forward 15 seconds">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/>
          </svg>
          <span class="skip-label">15</span>
        </button>
      </div>

      <!-- Speed Control -->
      <div class="speed-control">
        <span class="speed-label">Speed</span>
        <div class="speed-buttons">
          <button class="speed-btn" data-speed="0.75">0.75×</button>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="1.25">1.25×</button>
          <button class="speed-btn" data-speed="1.5">1.5×</button>
          <button class="speed-btn" data-speed="2">2×</button>
        </div>
      </div>

      <!-- Volume -->
      <div class="volume-control">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.02" value="1" class="volume-slider" />
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </div>

    </main>

    <!-- Library Panel -->
    <aside class="library-panel" id="libraryPanel">
      <div class="library-header">
        <h3>My Library</h3>
        <button class="icon-btn close-library" id="closeLibrary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="library-list" id="libraryList">
        <div class="empty-library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
            <path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
          </svg>
          <p>No audiobooks yet.<br/>Tap ↑ to upload files.</p>
        </div>
      </div>
    </aside>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

  </div>

  <audio id="audioPlayer" preload="metadata" playsinline></audio>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
